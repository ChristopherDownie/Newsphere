<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News Constellation</title>
  <link rel="stylesheet" href="/src/style.css">
</head>

<body>
  <div id="landing-page">
    <div class="landing-content">
      <h1>News Constellation</h1>
      <p>A procedural spatial audio experience</p>
      <button id="enter-btn">Enter</button>
    </div>
  </div>
  <div id="app" class="hidden">
    <canvas id="glcanvas"></canvas>
    <div id="tooltip" class="hidden"></div>
    <div id="search-panel">
      <input type="text" id="search-input" placeholder="Search news streams..." autocomplete="off">
      <ul id="search-results" class="hidden"></ul>
    </div>

    <div id="volume-control">
      <button id="mute-btn">MUTE</button>
      <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.3">
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
